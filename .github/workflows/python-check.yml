name: Python Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  python-312-import-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify requires-python
        run: python -c "import sys; assert sys.version_info >= (3, 12), sys.version"

      - name: Install minimal RL_training dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install gymnasium pettingzoo numpy

      - name: Import RL stack (3.10+ type syntax)
        env:
          PYTHONPATH: .
        run: |
          python -c "from RL_training.auto_upgrade import AutoUpgradePolicy, PRESET_BUILDS"
          python -c "from RL_training import DiepCustomParallelEnv"
